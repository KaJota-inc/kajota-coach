# Render service config for the KaJota Concierge agent.
#
# One-click deploy from this branch (hackathon/okx-asp — OKX.AI
# Genesis Hackathon, Jul 8–17, 2026):
#   1. Connect this repo to your Render account
#   2. Point at this render.yaml
#   3. Set branch = hackathon/okx-asp
#   4. Provision the secrets below via the Render dashboard
#      (sync: false fields below — Render won't accept JSON in
#      env vars, so use Secret Files for the GCP credential)
#
# After the first successful boot, the service URL becomes the
# COACH_AGENT_BASE the mobile coach hits.

services:
  - type: web
    name: kajota-coach-okx
    runtime: docker
    rootDir: agent
    plan: free
    branch: hackathon/okx-asp
    region: oregon

    dockerfilePath: Dockerfile
    dockerContext: .

    healthCheckPath: /healthz

    envVars:
      - key: PORT
        value: "8080"

      # ---- Gemini / Vertex AI -------------------------------------
      # Active submission model: gemini-2.5-pro (GA, no allowlist).
      # Allowlist request for gemini-3.1-pro-preview was posted on the
      # Google AI Developers Forum on Jun 10, 2026 — flip the dashboard
      # env-var override back to gemini-3.1-pro-preview if/when approved.
      - key: GEMINI_MODEL
        value: gemini-2.5-pro
      - key: GCP_PROJECT_ID
        sync: false   # Render dashboard input
      - key: GCP_REGION
        value: us-central1
      # The service-account JSON is mounted as a Secret File at
      # /etc/secrets/gcp-service-account.json by Render. The path
      # below is the standard env var the Google SDK reads.
      - key: GOOGLE_APPLICATION_CREDENTIALS
        value: /etc/secrets/gcp-service-account.json
      # Force google-genai (and therefore ADK) into Vertex AI mode
      # rather than the public Gemini API. agent.py also setdefaults
      # these, but pinning them in render.yaml makes the deploy spec
      # self-describing for anyone reading it.
      - key: GOOGLE_GENAI_USE_VERTEXAI
        value: "true"
      # Gemini 3 preview models only publish to the `global` endpoint.
      # GA models like gemini-2.5-pro also accept global, so this is
      # forward-compatible for either model id.
      - key: GOOGLE_CLOUD_LOCATION
        value: global

      # ---- MongoDB (the partner MCP integration) ------------------
      - key: PARTNER
        value: mongodb
      - key: MONGODB_URI
        sync: false   # Render dashboard input (MongoDB Atlas SRV URI)

      # ---- XLayer x402 paywall (POST /coach/premium) --------------
      # Premium agent turns settle an ERC-20 micropayment on XLayer
      # (OKX's Polygon-CDK L2 — testnet chain 195, mainnet 196) via a
      # standard x402 facilitator. This is the "no human sign-off"
      # settlement layer for the OKX.AI A2MCP ASP listing. All of the
      # values below are Render dashboard inputs (sync: false) so we can
      # register the ASP first, then swap in the facilitator + payTo +
      # asset without a redeploy. Until they're set, /coach/premium
      # returns 402 with a "server unconfigured" body — the service
      # still boots fine.
      - key: X402_FACILITATOR_URL
        sync: false             # e.g. Coinbase CDP or OKX-hosted x402 facilitator
      - key: X402_NETWORK
        value: eip155:195       # XLayer testnet (CAIP-2). Flip to eip155:196 for mainnet.
      - key: X402_MAX_AMOUNT
        value: "10000"          # atomic units; 6-dec USDC/USDT/KJUSD → $0.01
      - key: X402_PAY_TO
        sync: false             # 0x… recipient EOA / contract on XLayer
      - key: X402_ASSET
        sync: false             # 0x… ERC-20 token address on XLayer (USDC/USDT/KJUSD)
      - key: X402_ASSET_NAME
        value: KaJota USD       # Overwrite if using canonical USDC/USDT
      - key: X402_ASSET_VERSION
        value: "2"              # EIP-712 domain version (USDC v2 / ERC-3009)
      - key: X402_ASSET_DECIMALS
        value: "6"
      - key: X402_VERSION
        value: "1"              # Coinbase CDP speaks v1; bump to 2 if OKX facilitator does
      - key: X402_FACILITATOR_API_KEY
        sync: false             # SECRET — bearer token if facilitator requires it

      # ---- Optional ----------------------------------------------
      - key: COACH_BACKEND_URL
        sync: false   # The kajota-mobile-backend Render URL, if used

  # ---- KaJota Mesh Skill (OKX.AI Genesis submission) --------------
  # On-chain ERC-20 escrow on XLayer testnet, exposed as an agent skill
  # (SKILL.md at skill/SKILL.md) so downstream OKX.AI agents can settle
  # A2A escrow deals as a second-tier flow beyond the A2MCP paywall.
  - type: web
    name: kajota-mesh-okx
    runtime: docker
    rootDir: skill
    plan: free
    branch: hackathon/okx-asp
    region: oregon

    dockerfilePath: Dockerfile
    dockerContext: .

    healthCheckPath: /healthz

    envVars:
      - key: PORT
        value: "8081"
      # XLayer testnet HTTPS RPC — required to leave dry-run.
      - key: MESH_RPC_URL
        value: https://testrpc.xlayer.tech
      # Private key for the wallet authorised to call release / refund on
      # the deployed CosellEscrow. MUST match releaseAuth on-chain (the
      # deployer of scripts/deploy-xlayer.ts by default). Set from the
      # Render dashboard or wire a Secret File.
      - key: MESH_RELEASE_AUTH_KEY
        sync: false
      # XLayer testnet chain id — confirmed from okx/onchainos-skills
      # `cli/src/chains.rs`.
      - key: MESH_CHAIN_ID
        value: "195"
      - key: MESH_DRY_RUN
        value: "false"
      # Contract addresses — set from the dashboard after running
      # `pnpm --filter @kajota-mesh/contracts deploy:xlayer-testnet-with-mock`
      # and reading deployments/195.json.
      - key: MESH_ESCROW_ADDR
        sync: false
      - key: MESH_REGISTRY_ADDR
        sync: false
      - key: MESH_USDC_ADDR
        sync: false

# Render service config for the KaJota Concierge agent.
#
# One-click deploy from this branch (hackathon/rapid-agent):
#   1. Connect this repo to your Render account
#   2. Point at this render.yaml
#   3. Set branch = hackathon/rapid-agent
#   4. Provision the secrets below via the Render dashboard
#      (sync: false fields below — Render won't accept JSON in
#      env vars, so use Secret Files for the GCP credential)
#
# After the first successful boot, the service URL becomes the
# COACH_AGENT_BASE the mobile coach hits.

services:
  - type: web
    name: kajota-concierge-agent
    runtime: docker
    rootDir: agent
    plan: free
    branch: hackathon/rapid-agent
    region: oregon

    dockerfilePath: agent/Dockerfile
    dockerContext: agent

    healthCheckPath: /healthz

    envVars:
      - key: PORT
        value: "8080"

      # ---- Gemini / Vertex AI -------------------------------------
      # Active submission model: gemini-2.5-pro (GA, no allowlist).
      # Allowlist request for gemini-3.1-pro-preview was posted on the
      # Google AI Developers Forum on Jun 10, 2026 — flip the dashboard
      # env-var override back to gemini-3.1-pro-preview if/when approved.
      - key: GEMINI_MODEL
        value: gemini-2.5-pro
      - key: GCP_PROJECT_ID
        sync: false   # Render dashboard input
      - key: GCP_REGION
        value: us-central1
      # The service-account JSON is mounted as a Secret File at
      # /etc/secrets/gcp-service-account.json by Render. The path
      # below is the standard env var the Google SDK reads.
      - key: GOOGLE_APPLICATION_CREDENTIALS
        value: /etc/secrets/gcp-service-account.json
      # Force google-genai (and therefore ADK) into Vertex AI mode
      # rather than the public Gemini API. agent.py also setdefaults
      # these, but pinning them in render.yaml makes the deploy spec
      # self-describing for anyone reading it.
      - key: GOOGLE_GENAI_USE_VERTEXAI
        value: "true"
      # Gemini 3 preview models only publish to the `global` endpoint.
      # GA models like gemini-2.5-pro also accept global, so this is
      # forward-compatible for either model id.
      - key: GOOGLE_CLOUD_LOCATION
        value: global

      # ---- MongoDB (the partner MCP integration) ------------------
      - key: PARTNER
        value: mongodb
      - key: MONGODB_URI
        sync: false   # Render dashboard input (MongoDB Atlas SRV URI)

      # ---- Casper x402 paywall (POST /coach/premium) --------------
      # Premium agent turns settle a CEP-18 micropayment on Casper via
      # the CSPR.cloud x402 Facilitator. All sync:false (dashboard /
      # sponsored-key inputs). Until X402_PAY_TO + X402_ASSET +
      # X402_FACILITATOR_API_KEY are set, /coach/premium returns 402 and
      # explains it's unconfigured — the service still boots fine.
      - key: X402_FACILITATOR_URL
        value: https://x402-facilitator.cspr.cloud
      - key: X402_NETWORK
        value: casper:casper-test
      - key: X402_MAX_AMOUNT
        value: "1000000"        # atomic units; WCSPR 9-dec → 0.001 WCSPR
      - key: X402_PAY_TO
        sync: false             # merchant Casper account hash (faucet-funded)
      - key: X402_ASSET
        sync: false             # CEP-18 package hash; WCSPR — get from /supported
      - key: X402_FACILITATOR_API_KEY
        sync: false             # sponsored CSPR.cloud key from the buildathon
      # Casper MCP toolset stays OFF on Render (needs Docker, which the
      # Python image doesn't have). Enable it locally for the demo. The
      # x402 paywall above is the deployed on-chain surface.
      - key: CASPER_MCP_ENABLED
        value: "0"

      # ---- Optional ----------------------------------------------
      - key: COACH_BACKEND_URL
        sync: false   # The kajota-mobile-backend Render URL, if used

  # ---- KaJota Mesh Skill (NandaHack Step 2 submission) ------------
  # On-chain USDC escrow on Ethereum Sepolia, exposed as a
  # NANDA-discoverable agent skill.  Calling agents read SKILL.md
  # at skill/SKILL.md to use this service end-to-end.
  - type: web
    name: kajota-mesh-skill
    runtime: docker
    rootDir: skill
    plan: free
    branch: hackathon/nanda-mesh-skill
    region: oregon

    dockerfilePath: skill/Dockerfile
    dockerContext: skill

    healthCheckPath: /healthz

    envVars:
      - key: PORT
        value: "8081"
      # Sepolia HTTPS RPC (Alchemy / Infura / Ankr) — required to leave dry-run.
      - key: MESH_RPC_URL
        sync: false
      # Private key for the wallet authorised to call release / refund on
      # the deployed CosellEscrow.  MUST match releaseAuth on-chain
      # (0xe10cff27c99074cd44c64bed1b000226442524a4).  Treat as a Secret File
      # in Render if your team prefers; the env var path works too.
      - key: MESH_RELEASE_AUTH_KEY
        sync: false
      # Defaults baked into settings.py; override only if you redeploy
      # the contracts to different addresses.
      - key: MESH_CHAIN_ID
        value: "11155111"
      - key: MESH_DRY_RUN
        value: "false"
